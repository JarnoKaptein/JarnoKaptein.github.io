<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lief duifje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
        }

        .card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d63384;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 15px;
            border: 2px solid #eee;
            padding: 12px;
            margin-bottom: 20px;
            resize: none;
        }

        .form-control:focus {
            border-color: #d63384;
            box-shadow: 0 0 0 0.25 margin-bottom: 20px;rem rgba(214, 51, 132, 0.25);
        }

        .btn-pigeon {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.25rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
        }

        .btn-pigeon:hover {
            background-color: #5a6268;
            transform: translateY(-3px);
            color: white;
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="icon">🕊️</span>
        <h1>Van mij, voor jou</h1>
        
        <form action="https://homeassistant.pigeon-albacore.ts.net/api/webhook/xXspxlQHHYkCgRFZYEpq5KUw8xAao0UG" method="POST">
            <div class="mb-3">
                <label for="bericht" class="form-label text-muted">Laat je een berichtje achter?</label>
                <textarea class="form-control" id="bericht" name="bericht" rows="3" placeholder="Typ hier iets liefs..." required></textarea>
            </div>
            <button type="submit" class="btn btn-pigeon">
                Stuur naar Jarno
            </button>
        </form>
    </div>

</body>
</html>
