<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lief duifje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand', sans-serif; margin: 0; }
        .card { border: none; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); padding: 40px; text-align: center; max-width: 450px; width: 90%; }
        h1 { font-family: 'Dancing Script', cursive; color: #d63384; font-size: 3rem; margin-bottom: 20px; }
        .form-control { border-radius: 15px; border: 2px solid #eee; padding: 12px; margin-bottom: 20px; resize: none; }
        .btn-pigeon { background-color: #6c757d; color: white; border: none; padding: 15px 40px; font-size: 1.25rem; border-radius: 50px; transition: all 0.3s ease; width: 100%; }
        .btn-pigeon:hover { background-color: #5a6268; transform: translateY(-3px); }
        .status-msg { margin-top: 15px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <span>🕊️</span>
        <h1>Van beertje,<br>voor duifje</h1>
        
        <div class="mb-3 text-start">
            <textarea class="form-control" id="bericht" rows="3" placeholder="Typ hier..." required></textarea>
        </div>
        <button onclick="verstuurBericht()" id="verzendoKnop" class="btn btn-pigeon">Verstuur ❤️🐻</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        async function verstuurBericht() {
            const berichtInput = document.getElementById('bericht');
            const knop = document.getElementById('verzendoKnop');
            const status = document.getElementById('status');
            
            if (!berichtInput.value) {
                alert("Vergeet je berichtje niet!");
                return;
            }

            knop.disabled = true;
            knop.innerText = "Verzenden...";

            try {
                const response = await fetch("https://homeassistant.pigeon-albacore.ts.net/api/webhook/xXspxlQHHYkCgRFZYEpq5KUw8xAao0UG", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ bericht: berichtInput.value })
                });

                if (response.ok) {
                    status.style.display = "block";
                    status.style.color = "green";
                    status.innerText = "❤️ Bericht is aangekomen bij het beertje!";
                    berichtInput.value = "";
                } else {
                    throw new Error();
                }
            } catch (error) {
                status.style.display = "block";
                status.style.color = "red";
                status.innerText = "Oei, er ging iets mis. Is Jarno wel online?";
            } finally {
                knop.disabled = false;
                knop.innerText = "Stuur🐻";
            }
        }
    </script>
</body>
</html>
