<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lief duifje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
        }

        .card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d63384;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .btn-pigeon {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.25rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-pigeon:hover {
            background-color: #5a6268;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            color: white;
        }

        .btn-pigeon:active {
            transform: translateY(-1px);
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card animate__animated animate__fadeIn">
        <span class="icon">🕊️</span>
        <h1>Van mij, <br>voor jou</h1>
        <p>Speciaal voor mijn favoriete duifje (:</p>
        
        <form action="https://homeassistant.pigeon-albacore.ts.net/api/webhook/xXspxlQHHYkCgRFZYEpq5KUw8xAao0UG" method="POST">
            <button type="submit" class="btn btn-pigeon">
                Alleen voor duiven
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
